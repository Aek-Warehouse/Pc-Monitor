name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: app
        run: python -m pip install -r requirements.txt

      - name: Build executable
        working-directory: app
        run: python build.py

      - name: Package release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item app\dist\PCMonitor.exe release\
          Copy-Item app\README.md release\README.md
          Copy-Item app\config.example.json release\config.example.json
          Compress-Archive -Path release\* -DestinationPath PCMonitor-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCMonitor-windows
          path: PCMonitor-windows.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PCMonitor-windows.zip
