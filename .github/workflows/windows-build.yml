name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: app
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build executable
        working-directory: app
        run: python build.py

      - name: Prepare release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null

          Copy-Item app\dist\PCMonitor.exe release\PCMonitor.exe

          if (Test-Path README.md) {
            Copy-Item README.md release\README.md
          } elseif (Test-Path app\README.md) {
            Copy-Item app\README.md release\README.md
          }

          if (Test-Path app\config.example.json) {
            Copy-Item app\config.example.json release\config.example.json
          }

      - name: Create SHA256 checksums
        shell: pwsh
        run: |
          Get-FileHash .\release\PCMonitor.exe -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash)  PCMonitor.exe"
          } | Out-File -Encoding ascii SHA256SUMS.txt

      - name: Attest build provenance
        if: github.repository == 'Aek-Warehouse/Pc-Monitor'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/PCMonitor.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCMonitor-windows
          path: |
            release/PCMonitor.exe
            release/README.md
            release/config.example.json
            SHA256SUMS.txt

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/PCMonitor.exe
            release/README.md
            release/config.example.json
            SHA256SUMS.txt
          body: |
            Official PC Monitor Windows release.

            This release was built publicly through GitHub Actions from the source code in this repository.

            Included files:
            - PCMonitor.exe
            - README.md
            - config.example.json
            - SHA256SUMS.txt

            To verify the executable on Windows:
            Get-FileHash .\PCMonitor.exe -Algorithm SHA256

            Compare the result with SHA256SUMS.txt.
